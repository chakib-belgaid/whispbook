services:
  api:
    build:
      context: ./backend
    environment:
      WHISPBOOK_STORAGE: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

  web:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      WHISPBOOK_API_URL: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api

