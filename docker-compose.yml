services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      WHISPBOOK_STORAGE: /app/storage
      WHISPBOOK_BUNDLED_STYLES: /app/voice_styles
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./voice_styles:/app/voice_styles:ro

  web:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      WHISPBOOK_API_URL: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api
