name: Release Validation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Lint backend
        run: uv run --with ruff --with-requirements backend/requirements.txt ruff check backend/app backend/tests

      - name: Run backend tests
        run: uv run --with pytest --with-requirements backend/requirements.txt pytest backend/tests

      - name: Build backend image
        run: docker build -t whispbook-api:${{ github.sha }} backend
